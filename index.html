<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniList · 入口</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Zen+Dots&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; overflow: hidden; background: #0b0a12; }
    #particleCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  </style>
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <div class="gate-wrap" id="gateWrap">
    <div class="gate-card">

      <div class="gate-brand">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>AniList</span>
      </div>
      <p class="gate-desc">输入密码进入</p>

      <div class="gate-field">
        <div class="gate-input-box">
          <i class="fa-solid fa-lock gate-input-icon"></i>
          <input type="password" id="gatePassword" class="gate-input" placeholder="密码" autocomplete="off" spellcheck="false" />
        </div>
        <p class="gate-error" id="gateError">密码错误，请重试</p>
      </div>

      <button class="gate-btn" id="gateBtn">确 认</button>

    </div>
  </div>

  <script src="js/particles.js"></script>
  <script>
    (function() {
      'use strict';

      const PASSWORD = 'anime2024'; // ← 在这里改密码

      var c = document.getElementById('particleCanvas');
      if (c) new ParticleBackground(c);

      var input = document.getElementById('gatePassword');
      var btn = document.getElementById('gateBtn');
      var error = document.getElementById('gateError');
      var wrap = document.getElementById('gateWrap');

      if (sessionStorage.getItem('anilist_gate_passed') === '1') {
        window.location.replace('app.html');
        return;
      }

      // 移除错误状态
      function clearError() {
        error.classList.remove('show');
        input.classList.remove('shake');
        input.parentElement.classList.remove('error');
      }

      function tryEnter() {
        if (input.value === PASSWORD) {
          btn.disabled = true;
          input.disabled = true;
          input.parentElement.classList.remove('error');
          input.parentElement.classList.add('success');
          setTimeout(function() {
            wrap.style.opacity = '0';
            wrap.style.transition = 'opacity 0.5s ease';
            setTimeout(function() { window.location.replace('app.html'); }, 500);
          }, 400);
        } else {
          input.classList.add('shake');
          input.parentElement.classList.add('error');
          error.classList.add('show');
          input.value = '';
          input.blur();
          setTimeout(function() {
            input.classList.remove('shake');
            input.focus();
          }, 500);
        }
      }

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); tryEnter(); }
      });

      btn.addEventListener('click', tryEnter);
      input.addEventListener('input', clearError);

      setTimeout(function() { input.focus(); }, 600);
    })();
  </script>
</body>
</html>
