<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniList · 入口</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Zen+Dots&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; overflow: hidden; background: #0b0a12; }
    #particleCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* 背景轮播 */
    .bg-slideshow {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg-slideshow img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.8s ease;
    }
    .bg-slideshow img.active {
      opacity: 0.45;
    }
  </style>
</head>
<body>

  <!-- 背景轮播 -->
  <div class="bg-slideshow" id="bgSlideshow">
    <img src="images/bg1.jpg" alt="" />
    <img src="images/bg4.jpg" alt="" />
    <img src="images/bg5.jpg" alt="" />
    <img src="images/bg6.jpg" alt="" />
    <img src="images/bg11.jpg" alt="" />
  </div>

  <canvas id="particleCanvas"></canvas>

  <div class="gate-wrap" id="gateWrap">
    <div class="gate-box" id="gateBox">
      <div class="gate-input-wrap">
        <input type="password" id="gatePassword" class="gate-input" placeholder="✦ 密码" autocomplete="off" spellcheck="false" />
        <div class="gate-input-glow"></div>
      </div>
      <p class="gate-error" id="gateError">✧ 密码错误</p>
      <button class="gate-btn" id="gateBtn"><i class="fa-solid fa-arrow-right-to-bracket"></i> 进 入</button>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script>
    (function() {
      'use strict';

      const PASSWORD = '9421';

      // 粒子背景
      var c = document.getElementById('particleCanvas');
      if (c) new ParticleBackground(c);

      // 背景图轮播
      (function() {
        var imgs = document.querySelectorAll('#bgSlideshow img');
        if (imgs.length === 0) return;
        var idx = 0;
        imgs[idx].classList.add('active');
        setInterval(function() {
          imgs[idx].classList.remove('active');
          idx = (idx + 1) % imgs.length;
          imgs[idx].classList.add('active');
        }, 7000);
      })();

      var input = document.getElementById('gatePassword');
      var btn = document.getElementById('gateBtn');
      var error = document.getElementById('gateError');
      var wrap = document.getElementById('gateWrap');

      if (sessionStorage.getItem('anilist_gate_passed') === '1') {
        window.location.replace('app.html');
        return;
      }

      function tryEnter() {
        if (input.value === PASSWORD) {
          sessionStorage.setItem('anilist_gate_passed', '1');
          btn.disabled = true;
          input.classList.remove('shake');
          input.classList.add('success');
          input.disabled = true;
          setTimeout(function() {
            wrap.style.opacity = '0';
            wrap.style.transition = 'opacity 0.4s ease';
            setTimeout(function() { window.location.replace('app.html'); }, 400);
          }, 300);
        } else {
          input.classList.remove('success');
          input.classList.add('shake');
          error.classList.add('show');
          input.value = '';
          input.blur();
          setTimeout(function() {
            input.classList.remove('shake');
            input.focus();
          }, 500);
        }
      }

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); tryEnter(); }
      });

      btn.addEventListener('click', tryEnter);

      input.addEventListener('input', function() {
        error.classList.remove('show');
        input.classList.remove('shake');
      });

      setTimeout(function() { input.focus(); }, 600);
    })();
  </script>
</body>
</html>
