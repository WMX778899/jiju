<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniList · 入口</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Zen+Dots&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 门禁页专用：全屏粒子背景 */
    body { margin: 0; overflow: hidden; background: #0b0a12; }
    #particleCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  </style>
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <div class="gate-wrap" id="gateWrap">
    <div class="gate-box" id="gateBox">
      <div class="gate-input-wrap">
        <input type="password" id="gatePassword" class="gate-input" placeholder="✦ 密码" autocomplete="off" spellcheck="false" />
        <div class="gate-input-glow"></div>
      </div>
      <p class="gate-error" id="gateError">✧ 密码错误</p>
      <button class="gate-btn" id="gateBtn"><i class="fa-solid fa-arrow-right-to-bracket"></i> 进 入</button>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script>
    (function() {
      'use strict';

      const PASSWORD = 'anime2024'; // ← 在这里改密码

      // 粒子背景
      var c = document.getElementById('particleCanvas');
      if (c) new ParticleBackground(c);

      var input = document.getElementById('gatePassword');
      var btn = document.getElementById('gateBtn');
      var error = document.getElementById('gateError');
      var wrap = document.getElementById('gateWrap');

      // 已通过直接跳
      if (sessionStorage.getItem('anilist_gate_passed') === '1') {
        window.location.replace('app.html');
        return;
      }

      function tryEnter() {
        if (input.value === PASSWORD) {
          sessionStorage.setItem('anilist_gate_passed', '1');
          btn.disabled = true;
          input.classList.remove('shake');
          input.classList.add('success');
          input.disabled = true;
          setTimeout(function() {
            wrap.style.opacity = '0';
            wrap.style.transition = 'opacity 0.4s ease';
            setTimeout(function() { window.location.replace('app.html'); }, 400);
          }, 300);
        } else {
          input.classList.remove('success');
          input.classList.add('shake');
          error.classList.add('show');
          input.value = '';
          input.blur();
          setTimeout(function() {
            input.classList.remove('shake');
            input.focus();
          }, 500);
        }
      }

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); tryEnter(); }
      });

      btn.addEventListener('click', tryEnter);

      input.addEventListener('input', function() {
        error.classList.remove('show');
        input.classList.remove('shake');
      });

      setTimeout(function() { input.focus(); }, 600);
    })();
  </script>
</body>
</html>
